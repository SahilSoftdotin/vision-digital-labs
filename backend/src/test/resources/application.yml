# Test config — in-memory H2 so the context loads without a real Postgres.
# This file fully replaces the main application.yml on the test classpath,
# so it must define every property the beans require.
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  cache:
    type: simple

app:
  jwt:
    secret: test-secret-key-please-change-0123456789-abcdef
    expiration-ms: 86400000
    issuer: vision-digital-labs
  cors:
    allowed-origins: http://localhost:3000
  seed:
    enabled: false
    admin-email: admin@test.local
    admin-password: test12345
