spring:
  application:
    name: vision-digital-labs-api

  datasource:
    # Managed Postgres (Neon/Supabase). Override via env in real runs.
    # Example Neon URL:
    #   jdbc:postgresql://ep-xxx.aws.neon.tech/neondb?sslmode=require
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/visiondigitallab}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Keep the pool small — Supabase free tier has a low connection cap, and
      # zero-downtime redeploys briefly run two containers at once.
      maximum-pool-size: ${HIKARI_MAX_POOL:5}
      minimum-idle: ${HIKARI_MIN_IDLE:1}
      # Pooler closes idle connections; keep maxLifetime under that + keepalive.
      max-lifetime: ${HIKARI_MAX_LIFETIME:280000}
      keepalive-time: ${HIKARI_KEEPALIVE:30000}
      connection-timeout: ${HIKARI_CONN_TIMEOUT:20000}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        # Set explicitly so EntityManagerFactory init never needs live JDBC
        # metadata just to pick a dialect (avoids boot failure on a slow DB).
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true
    show-sql: false

  cache:
    type: ${CACHE_TYPE:simple} # in-memory ConcurrentMapCache; switch to 'redis' later

  mail:
    # Gmail SMTP (use a Google App Password, not your normal password).
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 8000
          timeout: 8000
          writetimeout: 8000

server:
  # Render (and most PaaS) inject PORT; fall back to SERVER_PORT, then 8080 locally.
  port: ${PORT:${SERVER_PORT:8080}}
  error:
    include-message: always
    include-binding-errors: always

# Application-specific config
app:
  jwt:
    # MUST be overridden in production. >= 32 chars for HS256.
    secret: ${JWT_SECRET:change-me-in-prod-this-is-a-dev-only-secret-key-0123456789}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24h
    issuer: vision-digital-labs
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  revalidate:
    # On-demand ISR revalidation of the Next.js frontend after content edits.
    enabled: ${REVALIDATE_ENABLED:false}
    url: ${REVALIDATE_URL:}
    secret: ${REVALIDATE_SECRET:}
  seed:
    enabled: ${SEED_ENABLED:true}
    admin-email: ${ADMIN_EMAIL:admin@visiondigitallab.com}
    admin-password: ${ADMIN_PASSWORD:admin12345}
  notify:
    # Email a recipient when a contact/consultation lead arrives.
    enabled: ${NOTIFY_ENABLED:false}
    to: ${NOTIFY_TO:}
    from: ${NOTIFY_FROM:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false # don't ping SMTP on every health check

logging:
  level:
    org.springframework.security: INFO
