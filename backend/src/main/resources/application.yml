spring:
  application:
    name: vision-digital-labs-api

  datasource:
    # Managed Postgres (Neon/Supabase). Override via env in real runs.
    # Example Neon URL:
    #   jdbc:postgresql://ep-xxx.aws.neon.tech/neondb?sslmode=require
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/visiondigitallab}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true
    show-sql: false

  cache:
    type: ${CACHE_TYPE:simple} # in-memory ConcurrentMapCache; switch to 'redis' later

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# Application-specific config
app:
  jwt:
    # MUST be overridden in production. >= 32 chars for HS256.
    secret: ${JWT_SECRET:change-me-in-prod-this-is-a-dev-only-secret-key-0123456789}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24h
    issuer: vision-digital-labs
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  seed:
    enabled: ${SEED_ENABLED:true}
    admin-email: ${ADMIN_EMAIL:admin@visiondigitallab.com}
    admin-password: ${ADMIN_PASSWORD:admin12345}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    org.springframework.security: INFO
